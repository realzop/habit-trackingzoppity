<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayCore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/themes.css">
</head>
<body>
    <div class="grid-overlay"></div>

    <nav id="nav" class="nav hidden">
        <div class="nav-brand">DayCore</div>
        <div class="nav-links">
            <a href="/dashboard" data-route="/dashboard" class="nav-link active">Dashboard</a>
            <a href="/history" data-route="/history" class="nav-link">History</a>
            <a href="/ai-review" data-route="/ai-review" class="nav-link">AI Review</a>
            <a href="/settings" data-route="/settings" class="nav-link">Settings</a>
        </div>
        <button id="logout-btn" class="btn-ghost">Logout</button>
    </nav>

    <main id="app" class="container"></main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal" id="modal-content"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/pages/setup.js"></script>
    <script src="/js/pages/login.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/history.js"></script>
    <script src="/js/pages/ai-review.js"></script>
    <script src="/js/pages/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
